<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Relationship Map - 50 Nodes</title>
  <!-- Prefer local `node_modules` after `npm install`; CDN only if missing (e.g. GitHub Pages) -->
  <script src="node_modules/d3/dist/d3.min.js"></script>
  <script>
    if (typeof d3 === 'undefined') {
      document.write('<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" crossorigin="anonymous"><\/script>');
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<svg width="100%" height="100%" viewBox="0 0 1400 900"></svg>

<div class="controls">
  <div class="zoom-controls">
    <label>Zoom: <input type="range" id="zoom-slider" min="0.1" max="3" step="0.1" value="1"></label>
    <button id="reset-zoom">Reset Zoom</button>
  </div>
  <div class="controls-divider" aria-hidden="true"></div>
  <label><input type="checkbox" id="hide-indirect"> Hide indirect connections</label>
</div>

<script src="script.js"></script>
</body>
</html>
